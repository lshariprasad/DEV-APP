name: smart_farming_mobile
description: A Hackathon Winning Smart Farming App using Flutter and Python.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Offline Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0

  # Maps
  google_maps_flutter: ^2.5.0

  # ML
  # tflite_flutter: ^0.10.4

  # Utils
  intl: ^0.19.0
  uuid: ^4.2.2
  image_picker: ^1.0.7
  path_provider: ^2.1.2

  # UI
  google_fonts: ^6.1.0
  glassmorphism: ^3.0.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/images/
  generate: true # For l10n
