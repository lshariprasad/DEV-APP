{% extends "base.html" %}

{% block title %}Disease Detection | Smart Harvest{% endblock %}

{% block content %}
<section class="demo">
    <h2>🌿 Crop Disease Detection</h2>

    <form method="post" enctype="multipart/form-data">
        <input type="file" name="leaf" required>
        <br><br>
        <button type="submit">Analyze Leaf</button>
    </form>

    {% if result %}
    <h3>Result:</h3>
    <p>{{ result }}</p>
    {% endif %}
</section>
{% endblock %}
